<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Login</title>
    <style>
        #main{
            padding-left: 500px;
        }
       #con{
        margin: 0px;
        padding: 20px;
        border: solid black 2px;
        width: 400px;
        align-items: center;
       }
       #end{
        padding-left: 550px;
       }
       .logo-container{
        padding-left: 120px;
       }
       .heading-xxl{
        font-size: xx-large;
       }
       .heading-lg{
        font-size: large;
       }
       .input-field{
        width: 280px;
        height: 50px;
        box-shadow: aqua;
       }
       .continue-btn{
        background-color: yellow;
        font-size: larger;
        width: 250px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
       }
       .agreement-text{
        font-size: larger;
       }
       .divider{
        width: 300px;
       }
       @media (max-width:1040px){
         #main{
            padding-left: 150px;
        }
        #end{
            padding-left: 150px;
        }
       }
       @media (max-width:700px){
        #main{
            padding-left: 10px;
        }
        #end{
            padding-left: 10px;
        }
       }
    </style>
</head>
<body>
    <div id="main">
    <img src="https://m.media-amazon.com/images/I/51HCHFclmmL.jpg" width="150px" class="logo-container" alt="Amazon Logo">
    <div id="con">
    <p class="heading-xxl">Sign in or create account</p>
    <p class="heading-lg"><b>Enter mobile number or email</b><br>
        <input type="text" class="input-field" placeholder="Enter your email or phone number"></p>
    <button class="continue-btn">Continue</button>
    <p class="agreement-text">By continuing, you agree to Amazon's Conditions <br>of <a href="">Use</a> and  <a href="">Privacy Notice.</a></p>
    <hr class="divider">
    <p><b>Buying for work?</b></p>
    <a href="">Creat a free business account</a>
        </div>
        <p></p>
    </div>
    <hr>
        <p id="end">© 1996–2025, Amazon.com, Inc. or its affiliates</p>

</body>
</html>
